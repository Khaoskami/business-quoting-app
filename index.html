const AUTH={
  PFX:"bqd_",SK:"bqd_auth_salt",HK:"bqd_auth_hash",IT:600000,KL:256,IV:12,LK:15*60*1000,
  gs(){return btoa(String.fromCharCode(...crypto.getRandomValues(new Uint8Array(32))))},
  async dk(pw,s){const sa=Uint8Array.from(atob(s),c=>c.charCodeAt(0));const b=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt:sa,iterations:this.IT,hash:"SHA-256"},b,{name:"AES-GCM",length:this.KL},false,["encrypt","decrypt"])},
  async vh(pw,s){const sa=Uint8Array.from(atob(s),c=>c.charCodeAt(0));const ps=new Uint8Array([...sa,...new TextEncoder().encode("v")]);const b=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveBits"]);const bi=await crypto.subtle.deriveBits({name:"PBKDF2",salt:ps,iterations:this.IT,hash:"SHA-256"},b,256);return btoa(String.fromCharCode(...new Uint8Array(bi)))},
  async enc(k,d){const iv=crypto.getRandomValues(new Uint8Array(this.IV));const c=await crypto.subtle.encrypt({name:"AES-GCM",iv},k,new TextEncoder().encode(JSON.stringify(d)));return JSON.stringify({iv:btoa(String.fromCharCode(...iv)),d:btoa(String.fromCharCode(...new Uint8Array(c)))})},
  async dec(k,s){try{const{iv,d}=JSON.parse(s);return JSON.parse(new TextDecoder().decode(await crypto.subtle.decrypt({name:"AES-GCM",iv:Uint8Array.from(atob(iv),c=>c.charCodeAt(0))},k,Uint8Array.from(atob(d),c=>c.charCodeAt(0)))));}catch{return null}},
  ok(){return localStorage.getItem(this.SK)!==null&&localStorage.getItem(this.HK)!==null},
  async setup(pw){const s=this.gs();localStorage.setItem(this.SK,s);localStorage.setItem(this.HK,await this.vh(pw,s));return this.dk(pw,s)},
  async login(pw){const s=localStorage.getItem(this.SK),h=localStorage.getItem(this.HK);if(!s||!h)return null;if(await this.vh(pw,s)!==h)return null;return this.dk(pw,s)},
  async chpw(ok,np){const s=this.gs(),nk=await this.dk(np,s);const ks=Object.keys(localStorage).filter(k=>k.startsWith(this.PFX)&&k!==this.SK&&k!==this.HK);for(const k of ks){const r=localStorage.getItem(k);if(!r)continue;const d=await this.dec(ok,r);if(d===null)continue;localStorage.setItem(k,await this.enc(nk,d));}localStorage.setItem(this.SK,s);localStorage.setItem(this.HK,await this.vh(np,s));return nk},
  nuke(){Object.keys(localStorage).filter(k=>k.startsWith(this.PFX)||k===this.SK||k===this.HK).forEach(k=>localStorage.removeItem(k))},

// --- SANITISE ---
function san(v){if(typeof v==="string"){const m={"<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;","&":"&amp;"};return v.replace(/[<>"'&]/g,c=>m[c])}if(Array.isArray(v))return v.map(san);if(v&&typeof v==="object")return Object.fromEntries(Object.entries(v).map(([k,val])=>[k,san(val)]));return v}
function vUrl(u){if(!u||typeof u!=="string")return"";const t=u.trim();if(!t)return"";try{const p=new URL(t.startsWith("http")?t:"https://"+t);if(!["http:","https:"].includes(p.protocol)||p.hostname.includes("javascript")||/[<>"'`]/.test(p.href))return"";return p.href}catch{return""}}
async function signQ(q,o){const p=JSON.stringify({id:q.id,title:q.title,items:q.items,total:calc(q.items,q.taxPercent,q.discountPercent).total,created:q.createdAt,owner:o.name||"Khaoskami",ts:new Date().toISOString()});const h=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(p));return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("")}

// --- STORAGE ---
function useS(key,fb,ck){
  const[data,setData]=useState(fb);const[ok,setOk]=useState(false);const fk=AUTH.PFX+key;
  useEffect(()=>{if(!ck)return;let s=false;(async()=>{try{const r=localStorage.getItem(fk);if(r){const d=await AUTH.dec(ck,r);if(!s&&d!==null)setData(d)}}catch{}if(!s)setOk(true)})();return()=>{s=true}},[fk,ck]);
  const save=useCallback(async(n)=>{if(!ck)return;const c=san(n);setData(c);try{localStorage.setItem(fk,await AUTH.enc(ck,c))}catch{}},[fk,ck]);
  return[data,save,ok];
}

function $(a,c="ZAR"){try{return new Intl.NumberFormat("en",{style:"currency",currency:c}).format(a||0)}catch{return(CUR.find(x=>x.c===c)?.s||"")+(a||0).toFixed(2)}}

function calc(it,tx,dc=0){const l=it.reduce((s,i)=>s+i.quantity*i.unitPrice,0),da=l*(dc/100),su=l-da,t=su*(tx/100);return{l,da,su,tx:t,tot:su+t}}

function nq(c){return{id:uid(),quoteNumber:"",title:"",clientId:"",clientName:"",clientUrl:"",status:"draft",currency:c||"ZAR",taxPercent:15,discountPercent:0,validityDays:30,notes:"",createdAt:new Date().toISOString(),items:[{id:uid(),description:"",quantity:1,unitPrice:0}],signature:"",signedAt:""}}

    <nav style={S.nav}>{tabs.map(t=><Tab key={t.id} label={t.l} active={pg===t.id||(pg==="ed"&&t.id==="dash")} onClick={()=>go(t.id)}/>)}</nav>
    <main style={S.main}>
      {pg==="dash"&&<Dash quotes={qs} currency={biz.defaultCurrency||"ZAR"} onNew={()=>{sAq(nq(biz.defaultCurrency));sPg("ed")}} onEdit={q=>{sAq({...q});sPg("ed")}} search={sr} setSearch={sSr}/>}
      {pg==="ed"&&aq&&<Ed initial={aq} clients={cls} catalog={cat} allQuotes={qs} biz={biz} onSave={svQ} onDelete={dlQ} onBack={()=>go("dash")} notify={nt}/>}
      {pg==="cat"&&<Cat catalog={cat} onSave={svP} onDelete={dlP} notify={nt}/>}
      {pg==="cls"&&<Cls clients={cls} onSave={svC} onDelete={dlC} notify={nt}/>}
      {pg==="set"&&<Sett biz={biz} onSave={sBiz} cryptoKey={ck} notify={nt} onLock={onLock} onKC={onKC}/>}
    </main>
    {toast&&<div style={S.toast(toast.t)}>{toast.m}</div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
